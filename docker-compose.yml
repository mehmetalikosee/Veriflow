# ACE Veriflow — Neo4j + PostgreSQL for local dev and E2E
# Usage: docker-compose up -d
# Then: run scripts/seed_neo4j.ps1 (set $env:NEO4J_PASSWORD = "veriflow123")
# Backend .env: NEO4J_URI=bolt://localhost:7687, NEO4J_PASSWORD=veriflow123, DATABASE_URL=postgresql+asyncpg://postgres:veriflow@localhost:5432/veriflow

services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/veriflow123
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: veriflow
      POSTGRES_DB: veriflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
